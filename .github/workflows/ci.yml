name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & test (live WMI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet (non-generated packages)
        run: go vet ./cmd/... ./internal/... ./runtime/... ./acceptance/

      # Unit tests plus live WMI queries against the runner's CIM repository.
      - name: Tests (unit + live acceptance)
        run: go test ./cmd/... ./internal/... ./runtime/... ./acceptance/

  offline:
    name: Offline tests & cross-compile (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The pure packages (coercion, DMTF parsing, snapshot formats, the
      # generators, DDF parsing) build and test on any OS.
      - name: Unit tests
        run: go test ./cmd/... ./internal/... ./runtime/...

      # The DDF-sourced CSP bindings are pure Go — build them natively.
      - name: Build CSP bindings
        run: go build ./bindings/csp/...

      - name: Cross-compile (windows/amd64 + windows/arm64)
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=arm64 go build ./...

  regen:
    name: Regeneration determinism gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Codegen is offline and deterministic from the committed snapshots
      # (acquisition — capture / fetchddf — is a separate step), so the gate
      # runs on the fast runner. Both pipelines regenerate: CIM classes from
      # metadata/cim, CSP policies from metadata/csp.
      - name: Regenerate from the committed snapshots
        run: |
          go run ./cmd/generate
          go run ./cmd/gencsp

      - name: Generated output must match the committed tree
        run: |
          git add -N bindings
          git diff --exit-code --stat -- bindings
